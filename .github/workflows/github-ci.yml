name: HardRock Playwright CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  playwright-test:
    name: Run Playwright @hardrock Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests (hardrock tag)
      run: |
        npx playwright test --grep @hardrock
      env:
        CI: true

    - name: Upload Playwright HTML Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-hardrock-report
        path: playwright-report/
        retention-days: 7

    - name: Upload Playwright Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-hardrock-results
        path: test-results/
        retention-days: 7
